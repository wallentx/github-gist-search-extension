name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    env:
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression suite
        run: xvfb-run -a env GSE_HEADLESS=false npm test

      - name: Package extension bundle
        run: npm run package

      - name: Upload packaged extension to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/github-gist-search-extension.zip --clobber

      - name: Publish to Chrome Web Store
        if: ${{ env.CWS_CLIENT_ID != '' && env.CWS_CLIENT_SECRET != '' && env.CWS_REFRESH_TOKEN != '' && env.CWS_PUBLISHER_ID != '' && env.CWS_EXTENSION_ID != '' }}
        run: node scripts/publish-extension.mjs dist/github-gist-search-extension.zip
